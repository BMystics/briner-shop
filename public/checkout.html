<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תשלום - ברינר 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B78BB; --navy-dark:#085E92; --navy-light:#2A97D5;
  --orange:#F5901A; --orange-dark:#D4740F; --orange-light:#FFB347;
  --gray-bg:#F5F7FA; --gray-light:#EEF1F6; --border:#DDE3EE;
  --text-dark:#1a1e2e; --text-mid:#3d4460; --text-light:#6B7A9A;
  --white:#fff; --error:#dc2626;
  --radius-sm:6px; --radius-md:10px; --radius-lg:16px;
  --shadow-sm:0 2px 8px rgba(11,120,187,0.08);
  --shadow-md:0 6px 24px rgba(11,120,187,0.14);
}
body{font-family:'Heebo',sans-serif;color:var(--text-dark);background:var(--gray-bg);line-height:1.6;min-height:100vh}
a{text-decoration:none;color:var(--navy)}

header{background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm)}
.header-inner{max-width:1280px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:22px;font-weight:900;color:var(--navy)}
.logo span{color:var(--orange)}
.back-link{font-size:14px;color:var(--text-mid);font-weight:600}
.back-link:hover{color:var(--navy)}

.checkout-wrap{max-width:1180px;margin:0 auto;padding:32px 24px 60px}
h1{font-size:32px;font-weight:900;margin-bottom:28px;color:var(--text-dark)}

.grid{display:grid;grid-template-columns:1.4fr 1fr;gap:28px;align-items:start}
@media(max-width:880px){.grid{grid-template-columns:1fr}}

/* ===== טופס ===== */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-sm)}
.card h2{font-size:18px;font-weight:800;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--gray-light);color:var(--text-dark)}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text-mid);margin-bottom:6px}
.field input, .field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'Heebo',sans-serif;color:var(--text-dark);background:var(--white);outline:none;transition:all 0.2s}
.field input:focus, .field textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(11,120,187,0.1)}
.field textarea{resize:vertical;min-height:80px}
.field.error input, .field.error textarea{border-color:var(--error)}
.field-error{font-size:12px;color:var(--error);margin-top:4px;display:none}
.field.error .field-error{display:block}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.row{grid-template-columns:1fr}}

/* ===== סיכום ===== */
.summary{position:sticky;top:24px}
.summary-items{margin-bottom:18px;max-height:300px;overflow-y:auto;padding-left:8px}
.summary-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-light)}
.summary-item:last-child{border:none}
.summary-img{width:54px;height:54px;border-radius:var(--radius-sm);background:var(--gray-bg);object-fit:cover;flex-shrink:0}
.summary-info{flex:1;min-width:0}
.summary-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:2px}
.summary-qty{font-size:12px;color:var(--text-light)}
.summary-price{font-size:14px;font-weight:700;color:var(--navy);flex-shrink:0}

.totals-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:14px;color:var(--text-mid)}
.totals-row.free{color:#16a34a;font-weight:700}
.totals-row.total{font-size:18px;font-weight:900;color:var(--text-dark);border-top:2px solid var(--gray-light);margin-top:10px;padding-top:14px}
.totals-row .amount{font-weight:700}

.empty-cart{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-cart a{display:inline-block;margin-top:14px;padding:10px 20px;background:var(--navy);color:var(--white);border-radius:var(--radius-sm);font-weight:700}

.btn-submit{width:100%;background:var(--orange);color:var(--white);border:none;padding:16px;border-radius:var(--radius-sm);font-size:16px;font-weight:800;font-family:'Heebo',sans-serif;cursor:pointer;margin-top:16px;transition:all 0.2s}
.btn-submit:hover:not(:disabled){background:var(--orange-dark)}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed}

.global-error{display:none;background:#fee;border:1px solid #fcc;color:var(--error);padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;margin-top:14px}
.global-error.show{display:block}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">ברינר<span>3D</span></a>
    <a href="/filaments" class="back-link">← חזרה לחנות</a>
  </div>
</header>

<div class="checkout-wrap">
  <h1>השלמת הזמנה</h1>

  <div id="emptyState" class="card empty-cart" style="display:none">
    <div style="font-size:48px;margin-bottom:8px">🛒</div>
    <div style="font-size:18px;font-weight:600">הסל שלך ריק</div>
    <a href="/filaments">לחזרה לחנות</a>
  </div>

  <div id="checkoutGrid" class="grid">
    <!-- === טופס === -->
    <form id="checkoutForm" novalidate>
      <div class="card" style="margin-bottom:24px">
        <h2>פרטי קונה</h2>
        <div class="field" data-field="customer.name">
          <label for="f-name">שם מלא *</label>
          <input id="f-name" name="name" type="text" autocomplete="name" required>
          <div class="field-error"></div>
        </div>
        <div class="row">
          <div class="field" data-field="customer.email">
            <label for="f-email">אימייל *</label>
            <input id="f-email" name="email" type="email" autocomplete="email" required>
            <div class="field-error"></div>
          </div>
          <div class="field" data-field="customer.phone">
            <label for="f-phone">טלפון *</label>
            <input id="f-phone" name="phone" type="tel" autocomplete="tel" placeholder="050-1234567" required>
            <div class="field-error"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>כתובת למשלוח</h2>
        <div class="field" data-field="shippingAddress.street">
          <label for="f-street">רחוב ומספר בית *</label>
          <input id="f-street" name="street" type="text" autocomplete="street-address" required>
          <div class="field-error"></div>
        </div>
        <div class="row">
          <div class="field" data-field="shippingAddress.city">
            <label for="f-city">עיר *</label>
            <input id="f-city" name="city" type="text" autocomplete="address-level2" required>
            <div class="field-error"></div>
          </div>
          <div class="field" data-field="shippingAddress.zip">
            <label for="f-zip">מיקוד</label>
            <input id="f-zip" name="zip" type="text" autocomplete="postal-code" inputmode="numeric">
            <div class="field-error"></div>
          </div>
        </div>
        <div class="field">
          <label for="f-notes">הערות להזמנה (אופציונלי)</label>
          <textarea id="f-notes" name="notes" maxlength="500"></textarea>
        </div>
      </div>

      <div id="globalError" class="global-error"></div>
    </form>

    <!-- === סיכום === -->
    <div class="summary">
      <div class="card">
        <h2>סיכום הזמנה</h2>
        <div id="summaryItems" class="summary-items"></div>
        <div class="totals-row"><span>סכום לפני מע"מ</span><span id="t-subtotal" class="amount">—</span></div>
        <div class="totals-row"><span>מע"מ <span id="t-vatRate"></span></span><span id="t-vat" class="amount">—</span></div>
        <div class="totals-row"><span>משלוח</span><span id="t-shipping" class="amount">—</span></div>
        <div class="totals-row total"><span>סה"כ לתשלום</span><span id="t-total" class="amount">—</span></div>
        <button type="submit" form="checkoutForm" id="btnSubmit" class="btn-submit">אישור הזמנה ←</button>
        <div style="font-size:11px;color:var(--text-light);text-align:center;margin-top:10px">
          לחיצה על "אישור הזמנה" יוצרת את ההזמנה.<br>
          התשלום יתבצע בשלב הבא (PayPlus יחובר בקרוב).
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/checkout.js"></script>
</body>
</html>
