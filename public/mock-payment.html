<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סליקה מדומה - ברינר 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:linear-gradient(135deg,#085E92,#0B78BB);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:#1a1e2e}
.card{background:#fff;border-radius:16px;padding:36px 40px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:520px;width:100%}
.dev-badge{display:inline-block;background:#FFB347;color:#1a1e2e;font-size:11px;font-weight:800;padding:4px 10px;border-radius:100px;letter-spacing:0.5px;margin-bottom:16px}
h1{font-size:24px;font-weight:900;margin-bottom:8px;color:#0B78BB}
.subtitle{color:#6B7A9A;font-size:14px;margin-bottom:24px;line-height:1.6}
.subtitle code{background:#EEF1F6;padding:2px 6px;border-radius:4px;font-size:12px;font-family:monospace}
.order-box{background:#F5F7FA;border:1px solid #DDE3EE;border-radius:10px;padding:18px;margin-bottom:24px}
.order-num{font-size:20px;font-weight:900;color:#0B78BB;font-family:monospace;letter-spacing:1px;margin-bottom:6px}
.detail{display:flex;justify-content:space-between;font-size:14px;padding:4px 0;color:#3d4460}
.detail .label{color:#6B7A9A}
.amount{font-size:28px;font-weight:900;color:#1a1e2e;text-align:center;padding:16px 0;border-top:2px solid #DDE3EE;margin-top:12px}
.amount-currency{font-size:18px;color:#6B7A9A;font-weight:600}
.actions{display:flex;gap:12px;margin-top:24px}
.btn{flex:1;padding:14px;border-radius:8px;border:none;font-size:15px;font-weight:800;font-family:'Heebo',sans-serif;cursor:pointer;transition:all 0.2s}
.btn:disabled{opacity:0.5;cursor:wait}
.btn-approve{background:#16a34a;color:#fff}
.btn-approve:hover:not(:disabled){background:#15803d}
.btn-decline{background:#fff;color:#dc2626;border:1.5px solid #dc2626}
.btn-decline:hover:not(:disabled){background:#fee}
.loading,.error{text-align:center;padding:40px;color:#6B7A9A}
.error{color:#dc2626}
</style>
</head>
<body>

<div class="card">
  <div class="dev-badge">סביבת פיתוח</div>
  <h1>סליקה מדומה</h1>
  <p class="subtitle">
    זהו דף סליקה זמני לפיתוח. הסליקה האמיתית של PayPlus תפעל כשתגדיר
    <code>PAYPLUS_API_KEY</code> ב-<code>.env</code>.
  </p>

  <div id="loading" class="loading">טוען פרטי הזמנה...</div>
  <div id="error" class="error" style="display:none"></div>

  <div id="content" style="display:none">
    <div class="order-box">
      <div class="order-num" id="orderNum"></div>
      <div class="detail"><span class="label">לקוח</span><span id="customerName"></span></div>
      <div class="detail"><span class="label">אימייל</span><span id="customerEmail"></span></div>
      <div class="detail"><span class="label">פריטים</span><span id="itemCount"></span></div>
      <div class="amount"><span id="amount"></span> <span class="amount-currency">₪</span></div>
    </div>

    <div class="actions">
      <button class="btn btn-decline" id="btnDecline">✗ דחה תשלום</button>
      <button class="btn btn-approve" id="btnApprove">✓ אשר תשלום</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/mock-payment.js"></script>
</body>
</html>
